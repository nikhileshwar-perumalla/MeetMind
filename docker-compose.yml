services:
  mongo:
    image: mongo:7
    container_name: meetmind-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: meetmind-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  server:
    build: ./server
    container_name: meetmind-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/meetmind
      - CHROMA_URL=http://chroma:8000
      - CLIENT_URL=http://localhost:5173
    env_file:
      - ./server/.env
    volumes:
      - uploads-data:/app/uploads

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:4000
    container_name: meetmind-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo-data:
  chroma-data:
  uploads-data:
